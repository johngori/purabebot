<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>ぷらべぼっと！</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;600;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>

<body>
  <div id="setting">
    <div id="splash-screen" style="text-align: center; margin-top: 50px;">
      <p style="margin-top: 20px; font-weight: bold; color: #666;">接続準備中...</p>
    </div>

    <div class="connect-form" id="connect-form" style="display: none;">
      <button id="btn-login-twitch" class="twitch-btn">Twitchでログイン</button>
    </div>
  </div>

  <div class="log-panel hidden" id="log-panel" style="display: none;">
    <div class="log-header" id="log-header">
      <span class="log-title">システムログ</span>
      <button id="btn-toggle-log" class="log-toggle-btn">▲ 表示</button>
    </div>
    <div class="connect-log" id="connect-log"></div>
  </div>
  <div class="connect-contents" id="connect-contents">

    <div class="left-contents">
      <div class="button-container" id="containts-info">
        <button id="btn-room">部屋立て</button>
        <button id="btn-refresh" disabled>更新</button>
        <button id="btn-close" disabled>受付終了</button>
      </div>
      <div class="help-tgl">
        <label>
          <input type="checkbox" name="tgl-help" checked="checked" onchange="helpChange(this.checked)"> helpを定期的にチャットする
        </label>
      </div>
      <div class="room-name">
        <div class="form-label">
          <label for="fm-room-name">部屋名</label>
        </div>
        <div class="form-input">
          <input type="text" id="fm-room-name" maxlength="20">
        </div>
      </div>
      <div class="room-pass">
        <div class="form-label">
          <label for="fm-room-pass">パスワード</label>
        </div>
        <div class="form-input">
          <input type="text" id="fm-room-pass" maxlength="20">
        </div>
      </div>
      <div class="player-count">
        <div class="play-count">
          <div class="form-label">
            <label for="fm-play-count">プレイ人数</label>
          </div>
          <div class="form-input">
            <input type="number" min="1" max="10" value="6" id="fm-play-count">
          </div>
        </div>
        <div class="rest-count">
          <div class="form-label">
            <label for="fm-rest-count">休憩枠</label>
          </div>
          <div class="form-input">
            <input type="number" min="0" max="5" value="3" id="fm-rest-count">
          </div>
        </div>
      </div>
      <div class="rest-member">
        <p>休憩メンバー（メンバークリックで休憩をパス）</p>
        <div class="list-container">
          <ul class="list-rest" id="rest-id">
          </ul>
        </div>
        <div class="button-container">
          <button id="btn-init">リセット</button>
          <button id="btn-next">次へ</button>
        </div>
      </div>
    </div>

    <div class="right-contents">
      <div
        style="display: flex; gap: 10px; align-items: center; justify-content: flex-end; height: 33px; margin-bottom: 5px;">
        <div id="server-url">http://localhost:3000/</div>
        <button id="btn-share" disabled>ツイートで募集</button>
      </div>
      <div class="member">
        <ul class="list-member" id="member-list">
        </ul>
      </div>
      <div class="add-member">
        <input type="text" id="fm-add-member" maxlength="20">
        <button id="btn-add">追加</button>
      </div>
    </div>
  </div>

  <script src="./twitch.js"></script>
</body>

</html>
